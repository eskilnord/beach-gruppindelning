name: Release

# Manual runs (workflow_dispatch) let a reviewer exercise the full packaging pipeline without
# cutting a release; pushing a `v*` tag additionally publishes a draft GitHub Release.
# docs/design/01-architecture.md §7, docs/plan.md M0 exit criteria, docs/adr/003.
on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

concurrency:
  # Deliberately NOT cancel-in-progress: a half-finished release build being killed mid-way
  # (e.g. right before the install+smoke step) is worse than letting a superseded run finish;
  # tags are also not expected to be pushed in rapid succession.
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------------------
  # Full pipeline per OS: fat jar -> jlinked JRE for the native target -> npm ci -> real
  # `tauri build` (release) -> INSTALL the actual produced artifact (not just the unbundled
  # binary) -> launch it with --smoke -> upload as a workflow artifact.
  # ---------------------------------------------------------------------------------------
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            os: macos-latest
          - platform: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      # Same rationale as ci.yml's packaged-smoke job: CI runners never have the exact pinned
      # Temurin patch, so build-jre.sh/.ps1 always download jmods from Adoptium; cache them
      # keyed on scripts/jre.env's hash.
      - name: Cache downloaded jlink jmods
        uses: actions/cache@v6
        with:
          path: .cache/jdks
          key: jdks-${{ runner.os }}-${{ hashFiles('scripts/jre.env') }}

      - name: Build backend fat jar (macOS)
        if: runner.os != 'Windows'
        working-directory: backend
        run: ./mvnw -q package -DskipTests

      - name: Build backend fat jar (Windows)
        if: runner.os == 'Windows'
        working-directory: backend
        shell: pwsh
        # PowerShell `run:` steps do NOT fail automatically just because a native .exe/.cmd
        # exits non-zero (no bash-style implicit `set -e`) — $LASTEXITCODE must be checked
        # explicitly, exactly like scripts/package.ps1 already does for mvnw.cmd.
        run: |
          $ErrorActionPreference = "Stop"
          .\mvnw.cmd -q package -DskipTests
          if ($LASTEXITCODE -ne 0) { throw "mvnw package failed with exit code $LASTEXITCODE" }

      # No --target flag: macos-latest runners are Apple Silicon (aarch64-apple-darwin is the
      # default host target, matching "macos-latest (aarch64 .dmg + .app)"); windows-latest
      # defaults to x86_64-pc-windows-msvc. build-jre.sh/.ps1 default to the current host
      # platform when --target/-Target is omitted, so this links a native-target JRE.
      # Ad-hoc signing of every jre binary (ADR-003: individually, BEFORE `tauri build`) is
      # already handled inside build-jre.sh's own step 4 on macOS — nothing extra needed here.
      - name: Build jlinked JRE for the native target (macOS)
        if: runner.os != 'Windows'
        run: bash scripts/build-jre.sh

      - name: Build jlinked JRE for the native target (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Invoked in-process (`&`, not a nested `pwsh -File` subprocess) so that
        # build-jre.ps1's own `throw` on failure terminates this step's pwsh process
        # directly, with no separate $LASTEXITCODE re-check needed.
        run: |
          $ErrorActionPreference = "Stop"
          & "scripts/build-jre.ps1"

      - name: Copy backend.jar into Tauri resources (macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p desktop/src-tauri/resources/backend
          cp backend/target/backend.jar desktop/src-tauri/resources/backend/backend.jar

      - name: Copy backend.jar into Tauri resources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # $ErrorActionPreference = "Stop" matters here: New-Item/Copy-Item are cmdlets whose
        # errors are non-terminating by default, so without it a failed copy would still
        # exit 0.
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/resources/backend | Out-Null
          Copy-Item backend/target/backend.jar desktop/src-tauri/resources/backend/backend.jar -Force

      # Root-level ci: the workspaces install covers BOTH the desktop package (tauri CLI) and
      # the frontend (whose production build now runs via tauri.conf.json's beforeBuildCommand
      # — the v0.1.0 installers shipped the M0 placeholder page because nothing built or
      # bundled the real SPA; frontendDist now points at ../../frontend/dist).
      - name: npm ci (workspaces root) (macOS)
        if: runner.os != 'Windows'
        run: npm ci

      - name: npm ci (workspaces root) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm ci
          if ($LASTEXITCODE -ne 0) { throw "npm ci failed with exit code $LASTEXITCODE" }

      # `tauri build` is release-mode by default (no --debug flag = release). macOS: ad-hoc
      # signing only at M0 — tauri.conf.json's `bundle.macOS.signingIdentity: "-"` seals the
      # outer .app/.dmg (ADR-003); Windows: NSIS installer, `installMode: currentUser` (no
      # elevation needed), `webviewInstallMode: downloadBootstrapper` covers machines missing
      # WebView2.
      #
      # >>> Developer ID signing + notarization slot in here later (post-M0 escalation path,
      # >>> per docs/plan.md "Packaging & CI" / ADR-003, once the nonprofit Apple Developer
      # >>> Program fee waiver is in hand). When that lands: change
      # >>> `bundle.macOS.signingIdentity` in tauri.conf.json away from "-", add a notarization
      # >>> step (`xcrun notarytool submit ... --wait` + `xcrun stapler staple`) right after
      # >>> this step, and set these as encrypted repo/environment secrets consumed here:
      # >>>   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD  (base64 .p12 export from Keychain)
      # >>>   APPLE_SIGNING_IDENTITY   (e.g. "Developer ID Application: Klubbnamn (TEAMID)")
      # >>>   APPLE_ID, APPLE_PASSWORD (app-specific password), APPLE_TEAM_ID
      # >>> Windows upgrade path (also documented, not wired up): Azure Trusted Signing /
      # >>> SignPath OSS, replacing the current unsigned NSIS build.
      - name: npm run tauri build (release) (macOS)
        if: runner.os != 'Windows'
        working-directory: desktop
        run: npm run tauri build

      - name: npm run tauri build (release) (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm run tauri build
          if ($LASTEXITCODE -ne 0) { throw "npm run tauri build failed with exit code $LASTEXITCODE" }

      # -----------------------------------------------------------------------------------
      # Install the REAL produced artifact (not the raw unbundled binary) and smoke it —
      # docs/plan.md "Packaging & CI": "CI must exercise the actual artifact".
      # -----------------------------------------------------------------------------------
      - name: Install .dmg and smoke the installed .app (macOS)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          BUNDLE_DIR="desktop/src-tauri/target/release/bundle"
          DMG_PATH="$(find "$BUNDLE_DIR/dmg" -maxdepth 1 -name '*.dmg' | head -1)"
          if [ -z "$DMG_PATH" ]; then
            echo "SMOKE FAIL: no .dmg found under $BUNDLE_DIR/dmg"; exit 1
          fi
          echo "Found dmg: $DMG_PATH"

          MOUNT_OUTPUT="$(hdiutil attach "$DMG_PATH" -nobrowse -readonly)"
          echo "$MOUNT_OUTPUT"
          MOUNT_POINT="$(printf '%s\n' "$MOUNT_OUTPUT" | grep -Eo '/Volumes/[^	]+' | tail -1)"
          if [ -z "$MOUNT_POINT" ]; then
            echo "SMOKE FAIL: could not parse a /Volumes mount point from hdiutil output"; exit 1
          fi
          echo "Mounted at: $MOUNT_POINT"

          APP_SRC="$(find "$MOUNT_POINT" -maxdepth 1 -name '*.app' | head -1)"
          if [ -z "$APP_SRC" ]; then
            echo "SMOKE FAIL: no .app bundle found on the mounted volume"
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi
          echo "Found app bundle: $APP_SRC"

          # Real "install": copy out of the dmg into a fresh Applications-like directory, then
          # unmount, exactly as a user dragging the icon over would leave on disk.
          INSTALL_DIR="$RUNNER_TEMP/gp-smoke-applications"
          mkdir -p "$INSTALL_DIR"
          cp -R "$APP_SRC" "$INSTALL_DIR/"
          INSTALLED_APP="$INSTALL_DIR/$(basename "$APP_SRC")"
          hdiutil detach "$MOUNT_POINT" -quiet

          # Note: this validates functional correctness (spawn/handshake/health/shutdown) of
          # the real installed bundle, NOT the Gatekeeper "unidentified developer" experience —
          # files produced and copied locally within the same CI job never pick up the
          # com.apple.quarantine xattr that Safari/Mail/AirDrop attach to actual downloads, so
          # Gatekeeper never intervenes here. The M0 exit criterion of opening the .dmg on a
          # genuinely clean, quarantined Mac following only docs/installation-mac.md remains a
          # manual check (docs/plan.md M0 row) — this job cannot substitute for it.
          BINARY="$INSTALLED_APP/Contents/MacOS/gruppindelning-desktop"
          if [ ! -x "$BINARY" ]; then
            echo "SMOKE FAIL: installed binary not found/executable at $BINARY"
            ls -la "$INSTALLED_APP/Contents/MacOS/" || true
            exit 1
          fi

          echo "Running installed app: $BINARY --smoke"
          set +e
          SMOKE_OUTPUT="$("$BINARY" --smoke 2>&1)"
          SMOKE_EXIT=$?
          set -e
          echo "$SMOKE_OUTPUT"

          if [ "$SMOKE_EXIT" -ne 0 ]; then
            echo "SMOKE FAIL: installed app exited with code $SMOKE_EXIT"
            exit 1
          fi
          if ! printf '%s' "$SMOKE_OUTPUT" | grep -q "SMOKE_OK"; then
            echo "SMOKE FAIL: exit code was 0 but SMOKE_OK was not found in captured output"
            exit 1
          fi
          echo "SMOKE OK: installed .app launched, full handshake succeeded, exit 0, SMOKE_OK present."

      - name: Install NSIS .exe silently and smoke the installed exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleDir = "desktop/src-tauri/target/release/bundle"
          $installer = Get-ChildItem -Path (Join-Path $bundleDir "nsis") -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
              throw "SMOKE FAIL: no NSIS installer .exe found under $bundleDir/nsis"
          }
          Write-Host "Found installer: $($installer.FullName)"

          # Silent install. nsis.installMode "currentUser" in tauri.conf.json needs no admin
          # elevation, so this runs fine under the default runner account.
          $installProc = Start-Process -FilePath $installer.FullName -ArgumentList "/S" -PassThru -Wait
          if ($installProc.ExitCode -ne 0) {
              throw "SMOKE FAIL: installer exited with code $($installProc.ExitCode)"
          }
          Start-Sleep -Seconds 2

          # Locate the installed exe by searching %LOCALAPPDATA% rather than hardcoding an
          # exact path: this repo has not been run through a real `tauri build` on an actual
          # Windows machine, so whether the installed filename follows `productName`
          # ("Gruppindelning.exe") or the Cargo binary name ("gruppindelning-desktop.exe") has
          # not been verified here. REVIEWER: once this job has run for real, consider
          # replacing this search with the exact known path for a faster/more precise check.
          $candidates = Get-ChildItem -Path $env:LOCALAPPDATA -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '(?i)gruppindelning' }
          if (-not $candidates) {
              Write-Host "Contents of $env:LOCALAPPDATA (for debugging):"
              Get-ChildItem -Path $env:LOCALAPPDATA -Recurse -ErrorAction SilentlyContinue |
                  Select-Object -First 200 -ExpandProperty FullName
              throw "SMOKE FAIL: could not locate the installed Gruppindelning executable under $env:LOCALAPPDATA"
          }
          $installedExe = ($candidates | Select-Object -First 1).FullName
          Write-Host "Found installed exe: $installedExe"

          # --- Diagnostics: pinpoint where backend.jar breaks (source tree vs installed).
          # First real Windows run failed with ClassNotFoundException: JarLauncher from the
          # INSTALLED app while the identical source-tree jar passed ci.yml's packaged-smoke.
          $installDir = Split-Path -Parent $installedExe
          $sourceJar = "desktop/src-tauri/resources/backend/backend.jar"
          $installedJar = Join-Path $installDir "resources\backend\backend.jar"
          Write-Host "--- jar diagnostics ---"
          Write-Host "install dir listing (2 levels):"
          Get-ChildItem -Path $installDir -Recurse -Depth 2 -ErrorAction SilentlyContinue | Select-Object -First 40 -ExpandProperty FullName
          foreach ($j in @($sourceJar, $installedJar)) {
              if (Test-Path $j) {
                  $h = Get-FileHash -Algorithm SHA256 $j
                  $len = (Get-Item $j).Length
                  Write-Host "$j : $len bytes, sha256=$($h.Hash)"
              } else {
                  Write-Host "$j : MISSING"
              }
          }
          if (Test-Path $installedJar) {
              $jarTool = Join-Path $env:JAVA_HOME "bin\jar.exe"
              & $jarTool tf $installedJar 2>&1 | Select-String -Pattern "JarLauncher|MANIFEST" | Select-Object -First 5 | ForEach-Object { Write-Host "installed jar entry: $_" }
          }

          # 2x2 matrix: {installed, source-tree} java  x  {installed, source-tree} jar.
          # Jar hashes match source<->installed, yet the installed run says
          # ClassNotFoundException: JarLauncher — so isolate whether the installed JRE
          # or something environmental is broken. Each run is BOUNDED (20s then kill).
          $sourceJre = "desktop/src-tauri/resources/jre/bin/java.exe"
          $installedJava = Join-Path $installDir "resources\jre\bin\java.exe"
          Write-Host "--- jre file hashes (source vs installed) ---"
          foreach ($rel in @("bin\java.exe", "bin\server\jvm.dll", "lib\modules")) {
              $s = Join-Path "desktop/src-tauri/resources/jre" $rel
              $i = Join-Path $installDir "resources\jre\$rel"
              $sh = if (Test-Path $s) { (Get-FileHash -Algorithm SHA256 $s).Hash.Substring(0,16) } else { "MISSING" }
              $ih = if (Test-Path $i) { (Get-FileHash -Algorithm SHA256 $i).Hash.Substring(0,16) } else { "MISSING" }
              $match = if ($sh -eq $ih) { "MATCH" } else { "DIFFER" }
              Write-Host ("{0}: src={1} inst={2} => {3}" -f $rel, $sh, $ih, $match)
          }
          function Invoke-BoundedJava([string]$label, [string]$javaExe, [string]$jar) {
              $outF = New-TemporaryFile; $errF = New-TemporaryFile
              $p = Start-Process -FilePath $javaExe -ArgumentList @("-jar", $jar, "--spring.main.web-application-type=none") `
                  -RedirectStandardOutput $outF -RedirectStandardError $errF -PassThru -NoNewWindow `
                  -Environment @{ GP_TOKEN = "diag" }
              if (-not $p.WaitForExit(20000)) { $p.Kill(); Write-Host "$label : still running after 20s (JVM+jar OK, killed)"; }
              else { Write-Host "$label : exited code $($p.ExitCode)" }
              Get-Content $errF -TotalCount 3 | ForEach-Object { Write-Host "$label [stderr] $_" }
              Get-Content $outF -TotalCount 3 | ForEach-Object { Write-Host "$label [stdout] $_" }
              Remove-Item $outF, $errF -ErrorAction SilentlyContinue
          }
          Write-Host "--- 2x2 java/jar matrix ---"
          Invoke-BoundedJava "instJava+instJar " $installedJava $installedJar
          Invoke-BoundedJava "instJava+srcJar  " $installedJava $sourceJar
          Invoke-BoundedJava "srcJava+instJar  " $sourceJre $installedJar
          Invoke-BoundedJava "srcJava+srcJar   " $sourceJre $sourceJar
          Write-Host "--- end jar diagnostics ---"

          # --- Windows GUI-subsystem stdout caveat -----------------------------------------
          # desktop/src-tauri/src/main.rs has:
          #   #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]
          # so release builds are compiled as a Windows GUI-subsystem binary: no console is
          # auto-allocated when double-clicked from Explorer. When launched here via .NET's
          # Process class with RedirectStandardOutput/Error = $true, the OS hands the child an
          # explicit, valid stdout/stderr pipe handle at CreateProcess time (STARTF_USESTDHANDLES)
          # regardless of subsystem — the "windows" subsystem flag only suppresses *automatic*
          # console allocation when no handle is provided, it does not block writes to an
          # explicitly redirected handle. So capturing `SMOKE_OK` this way is expected to work,
          # but it has NOT been verified against a real Windows CI run in this environment
          # (no Windows host available). Because of that uncertainty, the exit code is the
          # PRIMARY, authoritative pass/fail signal (main.rs only calls std::process::exit(0)
          # after spawn_and_handshake + shutdown fully succeed) — the SMOKE_OK string match is
          # a secondary, best-effort confidence check that only WARNS (never fails the job) if
          # it can't be found despite a clean exit code.
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $installedExe
          $psi.Arguments = "--smoke"
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.CreateNoWindow = $true

          $smokeProc = New-Object System.Diagnostics.Process
          $smokeProc.StartInfo = $psi
          $smokeProc.Start() | Out-Null
          $stdout = $smokeProc.StandardOutput.ReadToEnd()
          $stderr = $smokeProc.StandardError.ReadToEnd()
          $smokeProc.WaitForExit()

          Write-Host "---- smoke stdout ----"
          Write-Host $stdout
          Write-Host "---- smoke stderr ----"
          Write-Host $stderr

          if ($smokeProc.ExitCode -ne 0) {
              throw "SMOKE FAIL: installed app exited with code $($smokeProc.ExitCode)"
          }

          if ($stdout -match "SMOKE_OK") {
              Write-Host "SMOKE OK: exit code 0 and SMOKE_OK found in captured stdout."
          } else {
              Write-Warning "Exit code was 0 (spawn/handshake/shutdown succeeded per main.rs) but SMOKE_OK was not found in captured stdout. This is the documented Windows GUI-subsystem stdout caveat above -- treating exit code 0 as the authoritative pass signal."
          }

      - name: Upload macOS dmg installer
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: gruppindelning-macos-aarch64-dmg
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS .app bundle (debugging convenience, not a release asset)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: gruppindelning-macos-aarch64-app
          path: desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload Windows NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: gruppindelning-windows-x64-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows MSI installer (optional — NSIS is primary per docs/plan.md)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: gruppindelning-windows-x64-msi
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ---------------------------------------------------------------------------------------
  # Only on an actual `v*` tag push (never on workflow_dispatch): gather both OS artifacts
  # into one place and attach them to a single draft GitHub Release. Kept as a separate job
  # (rather than each matrix leg calling action-gh-release itself) to avoid two concurrent
  # "create release for this tag" race conditions — one call, both installers.
  # ---------------------------------------------------------------------------------------
  publish-release:
    name: publish draft GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: List downloaded artifacts
        run: find release-artifacts -type f

      - name: Create/update draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          name: Gruppindelning ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
          body: |
            Automated M0 packaging build for `${{ github.ref_name }}`.

            **Installers are unsigned / ad-hoc signed at this stage (ADR-003)** — macOS will
            show a Gatekeeper warning, Windows will show a SmartScreen warning. Follow the
            installation guides, which walk through both:

            - macOS: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/installation-mac.md
            - Windows: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/installation-windows.md

            This is a **draft** release — review the attached installers before publishing.
