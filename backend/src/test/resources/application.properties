# Test-only overrides. Loaded ONLY on the test classpath; the packaged app and `spring-boot:run`
# read src/main/resources/application.yaml (different filename, so nothing here shadows it —
# .properties and .yaml are both loaded, with .properties taking precedence for duplicate keys;
# this file deliberately contains no key that application.yaml also defines).

# Belt-and-braces against the SQLITE_BUSY ("database is locked") flake on slow Windows CI runners
# (backend windows-latest, run 28589334486): a test that starts a background solve can reach the
# next test method while the solve's writeback transaction (SolveCoordinator#onFinalBestSolution ->
# persistResult) still holds the SQLite write lock, and on a slow runner that window exceeded the
# production busy_timeout of 5000 ms, failing the next test's setup INSERTs. The PRIMARY fix is
# se.klubb.groupplanner.testsupport.ActiveSolveCleanup (cancels + awaits every leftover solve's
# run row to a terminal status after each test); this raised timeout only covers writes that race
# a solve DURING a test (legitimate: the solver writes back concurrently by design) so they wait
# instead of failing. Production stays at 5000 (see DataSourceConfig.BUSY_TIMEOUT_MS) — nothing
# competes for the write lock in the single-user packaged app, so a tight timeout there is a
# genuine deadlock alarm.
app.sqlite.busy-timeout-ms=30000
